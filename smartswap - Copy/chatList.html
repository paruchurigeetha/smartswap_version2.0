<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chats - SmartSwap</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="container mt-4 animate-fade-in">

<!-- HEADER -->
<div class="d-flex align-items-center mb-4 gap-3">
  <button class="btn btn-light rounded-circle p-2" style="width:45px; height:45px;" onclick="window.history.back()">
    ⬅️
  </button>
  <h3 class="fw-bold mb-0 text-primary">💬 Your Chats</h3>
</div>

<div class="row">
  <div class="col-md-8 col-lg-6 mx-auto" id="chatList">
    <!-- Chats injected here -->
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDY-2fpS9LqM8f92TOuHPpJO4FJuDOcp4U",
  authDomain: "smartswap-5176e.firebaseapp.com",
  projectId: "smartswap-5176e"
};

firebase.initializeApp(firebaseConfig);

let currentUser;

firebase.auth().onAuthStateChanged(user => {
  if (user) {
    currentUser = user.email;
    loadChats();
  } else {
    window.location.href = "login.html";
  }
});

function loadChats() {
  const box = document.getElementById("chatList");

  firebase.firestore().collection("messages")
    .orderBy("time", "desc")
    .onSnapshot(snapshot => {

      box.innerHTML = "";
      let chats = {};

      snapshot.forEach(doc => {
        const msg = doc.data();

        // only messages related to user
        if (msg.sender !== currentUser && msg.receiver !== currentUser) return;

        const other = msg.sender === currentUser ? msg.receiver : msg.sender;
        const key = other + "_" + msg.itemId;

        if (!chats[key]) {
          chats[key] = {
            user: other,
            itemId: msg.itemId,
            lastMessage: msg.text
          };
        }
      });

      const chatList = Object.values(chats);

      if (chatList.length === 0) {
        box.innerHTML = `
          <div class="glass-panel p-5 text-center mt-5">
            <h4 class="fw-bold">No active chats 😔</h4>
            <p class="text-muted mb-0">Start a conversation by reaching out to sellers!</p>
          </div>
        `;
        return;
      }

      chatList.forEach((chat, index) => {
        const delay = (index + 1) * 100;
        box.innerHTML += `
          <div class="glass-panel p-4 mb-3 animate-fade-in" style="animation-delay: ${delay}ms; cursor: pointer;"
               onclick='openChat("${chat.itemId}", "${chat.user}")'>
            <div class="d-flex align-items-center gap-3">
              <div class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center fs-4 fw-bold shadow-sm" style="width: 50px; height: 50px;">
                ${chat.user.charAt(0).toUpperCase()}
              </div>
              <div class="flex-grow-1">
                <h5 class="fw-bold mb-1">${chat.user}</h5>
                <p class="text-muted mb-0 text-truncate" style="max-width: 250px;">${chat.lastMessage}</p>
              </div>
              <div class="text-primary">
                ➡️
              </div>
            </div>
          </div>
        `;
      });

    });
}

// OPEN CHAT
function openChat(itemId, user) {
  localStorage.setItem("chatItemId", itemId);
  localStorage.setItem("chatUser", user);
  localStorage.setItem("chatItem", JSON.stringify({ name: "Chat" }));

  window.location.href = "chat.html";
}
</script>

</body>
</html>
