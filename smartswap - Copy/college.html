<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
  <title>Select College</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #25D366, #128C7E);
      font-family: 'Segoe UI', sans-serif;
    }

    .card-box {
      width: 400px;
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .list-group-item:hover {
      background: #f1f1f1;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="card-box">

  <h4 class="text-center mb-3">Select Your College 🎓</h4>

  <!-- SEARCH -->
  <input id="search" class="form-control mb-3" placeholder="Search college...">

  <!-- LIST -->
  <ul id="collegeList" class="list-group" style="max-height:250px;overflow-y:auto;"></ul>

</div>

<script>

const colleges = [
"Lendi Institute of Engineering and Technology",
"MVGR College of Engineering",
"Raghu Engineering College",
"Aditya Engineering College",
"Pragati Engineering College",
"GITAM University",
"ANITS Vizag",
"Vignan University",
"JNTU Kakinada",
"JNTU Hyderabad",
"CBIT Hyderabad",
"SRM University",
"VIT Vellore",
"KL University",
"Amrita University",
"Osmania University",
"Andhra University",
"Delhi University",
"IIT Hyderabad",
"NIT Warangal",
"IIIT Hyderabad",
"Manipal University",
"BITS Pilani",
"Lovely Professional University",
"Christ University"
];

// SHOW COLLEGES
function showColleges(filter = "") {
  const list = document.getElementById("collegeList");
  list.innerHTML = "";

  colleges
    .filter(c => c.toLowerCase().includes(filter.toLowerCase()))
    .forEach(c => {
      list.innerHTML += `
        <li class="list-group-item"
          onclick="selectCollege('${c}')">
          ${c}
        </li>
      `;
    });
}

// SELECT COLLEGE
function selectCollege(college) {
  localStorage.setItem("college", college);
  window.location.href = "dashboard.html";
}

// SEARCH EVENT
document.getElementById("search").onkeyup = function() {
  showColleges(this.value);
};

// INITIAL LOAD
showColleges();

</script>

</body>
</html>
