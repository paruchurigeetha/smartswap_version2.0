<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SmartSwap</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-card {
      padding: 40px 30px;
      text-align: center;
    }

    .logo {
      width: 90px;
      border-radius: 20px;
      margin: 0 auto 20px;
      display: block;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .title {
      font-weight: 800;
      margin-bottom: 30px;
      font-size: 1.8rem;
    }

    .form-control {
      margin-bottom: 20px;
      height: 50px;
    }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 0.9rem;
      color: var(--secondary);
      text-decoration: none;
      margin-top: -10px;
      margin-bottom: 20px;
      font-weight: 500;
      transition: color 0.3s;
    }

    .forgot-link:hover {
      color: var(--primary);
    }

    .btn-login {
      height: 50px;
      font-size: 1.1rem;
      margin-bottom: 15px;
    }

    /* Abstract shapes for login bg */
    .shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      z-index: 0;
      opacity: 0.5;
    }
    .shape-1 {
      top: 10%; left: 10%; width: 300px; height: 300px; background: rgba(16, 185, 129, 0.4);
    }
    .shape-2 {
      bottom: 10%; right: 10%; width: 350px; height: 350px; background: rgba(59, 130, 246, 0.4);
    }
  </style>
</head>

<body>

<div class="shape shape-1"></div>
<div class="shape shape-2"></div>

<div class="login-wrapper animate-fade-in">
  <div class="glass-panel login-card">
    
    <img src="icon.jpg" class="logo" alt="SmartSwap Logo">
    
    <h4 class="title">Welcome Back 👋</h4>

    <input id="email" class="form-control delay-100 animate-fade-in" placeholder="Enter Email" type="email">
    <input id="password" type="password" class="form-control delay-200 animate-fade-in" placeholder="Enter Password">

    <a href="#" onclick="forgotPassword()" class="forgot-link delay-300 animate-fade-in">Forgot Password?</a>
    
    <button class="btn btn-success w-100 btn-login delay-300 animate-fade-in" onclick="login()">Login</button>
    <button class="btn btn-light w-100 btn-login delay-400 animate-fade-in" onclick="signup()">Create Account</button>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDY-2fpS9LqM8f92TOuHPpJO4FJuDOcp4U",
  authDomain: "smartswap-5176e.firebaseapp.com",
  projectId: "smartswap-5176e",
  storageBucket: "smartswap-5176e.firebasestorage.app",
  messagingSenderId: "584861621977",
  appId: "1:584861621977:web:44e6d5a404d2f3c26a28c8"
};

firebase.initializeApp(firebaseConfig);

// SIGNUP
function signup() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Please fill all fields ⚠️");
    return;
  }

  firebase.auth().createUserWithEmailAndPassword(email, password)
    .then(() => {
      alert("Signup Successful ✅");
    })
    .catch(error => {
      alert(error.message);
    });
}

// LOGIN
function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Please fill all fields ⚠️");
    return;
  }

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(() => {
      document.body.style.opacity = '0';
      document.body.style.transition = 'opacity 0.4s ease';
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 400);
    })
    .catch(error => {
      alert(error.message);
    });
}

function forgotPassword() {
  const email = prompt("Enter your registered email:");

  if (!email) {
    alert("Please enter email");
    return;
  }

  firebase.auth().sendPasswordResetEmail(email)
    .then(() => {
      alert("Password reset link sent to your email ✅");
    })
    .catch((error) => {
      alert(error.message);
    });
}
</script>

</body>
</html>
