<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Items - SmartSwap</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="container mt-4 animate-fade-in">

<!-- HEADER -->
<div class="d-flex align-items-center mb-4 gap-3">
  <button class="btn btn-light rounded-circle p-2" style="width:45px; height:45px;" onclick="window.history.back()">
    ⬅️
  </button>
  <div>
    <h3 class="fw-bold mb-0 text-primary">My Posted Items 📦</h3>
    <h6 id="itemCount" class="text-muted mt-1"></h6>
  </div>
</div>

<!-- ITEMS -->
<div id="myItemsContainer" class="row"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDY-2fpS9LqM8f92TOuHPpJO4FJuDOcp4U",
  authDomain: "smartswap-5176e.firebaseapp.com",
  projectId: "smartswap-5176e"
};

firebase.initializeApp(firebaseConfig);

let currentUser;

firebase.auth().onAuthStateChanged(user => {
  if (user) {
    currentUser = user.email;
    loadMyItems();
  } else {
    window.location.href = 'login.html';
  }
});

function loadMyItems() {
  const container = document.getElementById("myItemsContainer");
  const countBox = document.getElementById("itemCount");

  firebase.firestore().collection("items")
    .where("owner", "==", currentUser)
    .onSnapshot(snapshot => {

      container.innerHTML = "";
      let count = 0;

      snapshot.forEach(doc => {
        const item = doc.data();
        count++;

        container.innerHTML += `
        <div class="col-lg-4 col-md-6 col-sm-12 mb-4 animate-fade-in delay-100">
          <div class="card h-100">
            <div style="overflow:hidden; position:relative;">
              <img src="${item.image}" onerror="this.src='https://via.placeholder.com/300?text=No+Image';" style="height:220px;width:100%;object-fit:cover;">
            </div>

            <div class="card-body d-flex flex-column p-4">
              <h5 class="fw-bold text-truncate mb-1">${item.name}</h5>
              <div class="d-flex align-items-center mb-3">
                <h5 class="text-success fw-bold mb-0 me-2">₹${item.price}</h5>
                <small class="text-muted text-decoration-line-through">₹${item.mrp}</small>
              </div>

              <div class="mt-auto pt-2">
                <button class="btn btn-danger w-100 fw-semibold" onclick='deleteItem("${doc.id}")'>
                  🗑 Delete
                </button>
              </div>
            </div>
          </div>
        </div>
        `;
      });

      // ✅ COUNT DISPLAY
      countBox.innerText = count + " items";

      // ✅ EMPTY STATE
      if (count === 0) {
        container.innerHTML = `
          <div class="col-12 text-center mt-5">
            <div class="glass-panel p-5 d-inline-block">
              <h4 class="fw-bold">No items posted yet 😔</h4>
              <p class="text-muted mb-0">Start selling your items from the dashboard 🛒</p>
            </div>
          </div>
        `;
        countBox.innerText = "0 items";
      }

    });
}

// DELETE FUNCTION
function deleteItem(id) {
  if (confirm("Delete this item?")) {
    firebase.firestore().collection("items").doc(id).delete();
  }
}
</script>

</body>
</html>
