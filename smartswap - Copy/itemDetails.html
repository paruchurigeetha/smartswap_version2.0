<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item Details - SmartSwap</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      padding-top: 40px;
    }
    
    .product-img-wrapper {
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      position: relative;
    }
    
    .product-img-wrapper img {
      width: 100%;
      height: 450px;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .product-img-wrapper:hover img {
      transform: scale(1.05);
    }

    .product-details {
      padding: 30px;
    }
  </style>
</head>

<body class="container">

<!-- Back button -->
<div class="mb-4 animate-fade-in">
  <button class="btn btn-light rounded-circle p-2" style="width:45px; height:45px;" onclick="window.history.back()">
    ⬅️
  </button>
</div>

<div id="details" class="row animate-fade-in delay-100 align-items-center">
  <!-- JS content goes here -->
</div>

<script>
  const item = JSON.parse(localStorage.getItem("selectedItem"));

  document.getElementById("details").innerHTML = `
    <div class="col-md-6 mb-4">
      <div class="product-img-wrapper">
        <img src="${item.image}" alt="${item.name}">
        <div class="position-absolute top-0 start-0 m-3 px-3 py-1 bg-white rounded-pill shadow-sm" style="font-size: 0.9rem; font-weight: 700; color: var(--primary);">
          ✨ Premium Listing
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="glass-panel product-details h-100 d-flex flex-column justify-content-center">
        <h2 class="fw-bold mb-2" style="font-size: 2.5rem;">${item.name}</h2>
        
        <p class="text-muted mb-4 fs-5">
          <span class="me-2">📍</span>${item.college || "General"}
        </p>
        
        <div class="d-flex align-items-baseline mb-4">
          <h1 class="text-success fw-bold me-3 mb-0" style="font-size: 3rem;">₹${item.price}</h1>
          <h4 class="text-muted text-decoration-line-through mb-0">₹${item.mrp}</h4>
        </div>

        <div class="mb-4">
          <h5 class="fw-bold">Description</h5>
          <p class="text-muted fs-5">${item.description || "No description provided."}</p>
        </div>

        <div class="mb-4">
          <h5 class="fw-bold">Contact Info</h5>
          <p class="text-muted fs-5">${item.contact || "Not available"}</p>
        </div>
      </div>
    </div>
  `;
</script>

</body>
</html>
