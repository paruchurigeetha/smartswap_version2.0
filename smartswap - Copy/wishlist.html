<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wishlist - SmartSwap</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="container mt-4 animate-fade-in">

<!-- HEADER -->
<div class="d-flex align-items-center mb-4 gap-3">
  <button class="btn btn-light rounded-circle p-2" style="width:45px; height:45px;" onclick="window.history.back()">
    ⬅️
  </button>
  <h3 class="fw-bold mb-0 text-danger">My Wishlist ❤️</h3>
</div>

<div id="wishlistContainer" class="row"></div>

<script>
let items = JSON.parse(localStorage.getItem("wishlist")) || [];
const container = document.getElementById("wishlistContainer");

// LOAD ITEMS
function loadWishlist() {
  container.innerHTML = "";

  items.forEach((item, index) => {
    container.innerHTML += `
    <div class="col-lg-4 col-md-6 col-sm-12 mb-4 animate-fade-in delay-100">
      <div class="card h-100">
        <div style="overflow:hidden; position:relative;">
          <img src="${item.image}" onerror="this.src='https://via.placeholder.com/300?text=No+Image';" style="height:220px;width:100%;object-fit:cover;">
          <div class="position-absolute top-0 end-0 m-2 px-2 py-1 bg-white rounded-pill shadow-sm" style="font-size: 0.8rem; font-weight: 600; color: #ef4444;">
            ❤️ Wishlist
          </div>
        </div>

        <div class="card-body d-flex flex-column p-4">
          <h5 class="fw-bold text-truncate mb-1">${item.name}</h5>
          
          <div class="d-flex align-items-center mb-3">
            <h5 class="text-success fw-bold mb-0 me-2">₹${item.price}</h5>
            <small class="text-muted text-decoration-line-through">₹${item.mrp}</small>
          </div>
          
          <p class="text-muted small mb-3">
            <span class="me-1">📍</span>${item.college || "General"}
          </p>

          <div class="mt-auto d-flex gap-2">
            <button class="btn btn-primary flex-grow-1" onclick="buyItem(${index})">
              🛒 Buy / Chat
            </button>
            <button class="btn btn-light px-3" onclick="removeItem(${index})">
              ❌
            </button>
          </div>
        </div>
      </div>
    </div>
    `;
  });

  // EMPTY STATE
  if (items.length === 0) {
    container.innerHTML = `
      <div class="col-12 text-center mt-5">
        <div class="glass-panel p-5 d-inline-block">
          <h4 class="fw-bold">No items in wishlist 😔</h4>
          <p class="text-muted mb-0">Start adding items you love ❤️</p>
        </div>
      </div>
    `;
  }
}

// REMOVE ITEM
function removeItem(index) {
  items.splice(index, 1);
  localStorage.setItem("wishlist", JSON.stringify(items));
  loadWishlist();
}

// BUY ITEM
function buyItem(index) {
  const item = items[index];

  localStorage.setItem("chatItemId", item.id);
  localStorage.setItem("chatItem", JSON.stringify(item));
  localStorage.setItem("chatUser", item.owner);

  window.location.href = "chat.html";
}

loadWishlist();
</script>

</body>
</html>
