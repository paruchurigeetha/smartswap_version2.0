<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - SmartSwap</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      padding-top: 20px;
    }
    
    .chat-container {
      max-width: 800px;
      margin: 0 auto;
      height: calc(100vh - 40px);
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      border-radius: 20px 20px 0 0;
      padding: 15px 25px;
      display: flex;
      align-items: center;
      gap: 15px;
      background: var(--primary);
      color: white;
    }

    #chatBox {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
    }

    .chat-input-area {
      border-radius: 0 0 20px 20px;
      padding: 15px;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--glass-border);
    }

    .msg-bubble {
      max-width: 75%;
      padding: 12px 18px;
      border-radius: 20px;
      margin-bottom: 5px;
      font-size: 1rem;
      box-shadow: var(--shadow-sm);
    }

    .msg-mine {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border-bottom-right-radius: 5px;
    }

    .msg-theirs {
      background: white;
      color: #334155;
      border-bottom-left-radius: 5px;
    }
    
    body.dark-mode .msg-theirs {
      background: #334155;
      color: white;
    }

    .msg-time {
      font-size: 0.75rem;
      margin-top: 5px;
      opacity: 0.7;
      text-align: right;
    }
  </style>
</head>

<body>

<div class="container-fluid chat-container animate-fade-in">

  <!-- Header -->
  <div class="chat-header shadow-sm">
    <button class="btn btn-light rounded-circle p-2 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;" onclick="window.history.back()">
      ⬅️
    </button>
    <div class="d-flex flex-column">
      <h5 id="chatTitle" class="mb-0 fw-bold">Chat</h5>
      <small id="itemDetailsText" class="opacity-75">Loading details...</small>
    </div>
  </div>

  <!-- Messages -->
  <div id="chatBox"></div>

  <!-- Input -->
  <div class="chat-input-area d-flex gap-2">
    <input id="message" class="form-control rounded-pill px-4" placeholder="Type a message..." style="background: rgba(255,255,255,0.8);" onkeypress="if(event.key === 'Enter') sendMessage()">
    <button class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm" onclick="sendMessage()">Send</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDY-2fpS9LqM8f92TOuHPpJO4FJuDOcp4U",
  authDomain: "smartswap-5176e.firebaseapp.com",
  projectId: "smartswap-5176e"
};

firebase.initializeApp(firebaseConfig);

// GET DATA
let item = JSON.parse(localStorage.getItem("chatItem"));
const itemId = String(localStorage.getItem("chatItemId"));
let otherUser = localStorage.getItem("chatUser");

let currentUser;

// 🔥 FIX: If item is incomplete → fetch from Firestore
if (!item || !item.price) {
  firebase.firestore().collection("items").doc(itemId).get()
  .then(doc => {
    if (doc.exists) {
      item = doc.data();

      // update localStorage also
      localStorage.setItem("chatItem", JSON.stringify(item));

      showItemDetails();
    }
  });
} else {
  showItemDetails();
}

// ✅ DISPLAY FUNCTION
function showItemDetails() {
  document.getElementById("itemDetailsText").innerText = `₹${item.price || "0"}`;
  document.getElementById("chatTitle").innerText = item.name || "Chat";
}

// AUTH
firebase.auth().onAuthStateChanged(user => {
  if (user) {
    currentUser = user.email;

    if (!otherUser && item) {
      otherUser = item.owner;
    }

    loadMessages();
  } else {
    window.location.href = "login.html";
  }
});

// SEND MESSAGE
function sendMessage() {
  const text = document.getElementById("message").value.trim();
  if (!text) return;

  firebase.firestore().collection("messages").add({
    sender: currentUser,
    receiver: otherUser,
    itemId: String(itemId),
    text: text,
    time: firebase.firestore.FieldValue.serverTimestamp()
  });

  firebase.firestore().collection("notifications").add({
    to: otherUser,
    from: currentUser,
    itemId: itemId,
    itemName: item?.name || "Item",
    message: text,
    time: firebase.firestore.FieldValue.serverTimestamp(),
    seen: false
  });

  document.getElementById("message").value = "";
}

// LOAD MESSAGES
function loadMessages() {
  const box = document.getElementById("chatBox");

  firebase.firestore().collection("messages")
    .orderBy("time", "asc")
    .onSnapshot(snapshot => {

      box.innerHTML = "";

      snapshot.forEach(doc => {
        const msg = doc.data();

        if (
          String(msg.itemId) === String(itemId) &&
          (
            (msg.sender === currentUser && msg.receiver === otherUser) ||
            (msg.sender === otherUser && msg.receiver === currentUser)
          )
        ) {

          const isMe = msg.sender === currentUser;

          let timeText = "";
          if (msg.time && msg.time.toDate) {
            const date = msg.time.toDate();
            timeText = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          }

          box.innerHTML += `
            <div class="d-flex w-100 ${isMe ? 'justify-content-end' : 'justify-content-start'} mb-3">
              <div class="msg-bubble ${isMe ? 'msg-mine' : 'msg-theirs'}">
                <div>${msg.text}</div>
                <div class="msg-time">${timeText}</div>
              </div>
            </div>
          `;
        }
      });

      box.scrollTop = box.scrollHeight;
    });
}
</script>

</body>
</html>
