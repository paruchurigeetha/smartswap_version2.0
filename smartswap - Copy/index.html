<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartSwap - The Premium Campus Marketplace</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
    }
    
    .hero-container {
      max-width: 600px;
      padding: 40px;
      position: relative;
      z-index: 10;
    }

    .logo-container {
      position: relative;
      display: inline-block;
      margin-bottom: 30px;
    }

    .logo {
      width: 160px;
      border-radius: 35px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      animation: float 4s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }

    .logo-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(16,185,129,0.5) 0%, rgba(16,185,129,0) 70%);
      z-index: 1;
      filter: blur(15px);
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
      50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.4; }
    }

    .app-name {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #10b981, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 1.2rem;
      color: var(--text-muted);
      margin-bottom: 40px;
      font-weight: 400;
    }

    .btn-start {
      padding: 16px 40px;
      font-size: 1.2rem;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
    }
    
    .btn-start:hover {
      box-shadow: 0 15px 40px rgba(16, 185, 129, 0.6);
      transform: translateY(-3px) scale(1.05);
    }

    /* Abstract background shapes */
    .shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.6;
    }
    .shape-1 {
      top: -10%; left: -10%; width: 400px; height: 400px; background: rgba(59, 130, 246, 0.3);
    }
    .shape-2 {
      bottom: -10%; right: -10%; width: 500px; height: 500px; background: rgba(16, 185, 129, 0.3);
    }
  </style>
</head>
<body>

  <!-- Abstract Background -->
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>

  <div class="hero-container glass-panel animate-fade-in">
    <div class="logo-container">
      <div class="logo-glow"></div>
      <img src="icon.jpg" class="logo" alt="SmartSwap Logo">
    </div>

    <div class="app-name animate-fade-in delay-100">SmartSwap</div>
    <div class="tagline animate-fade-in delay-200">The Ultimate Campus Marketplace for Students</div>

    <button class="btn btn-success btn-start animate-fade-in delay-300" onclick="goLogin()">
      Get Started <span style="margin-left: 8px;">🚀</span>
    </button>
  </div>

  <script>
    function goLogin() {
      // Add a smooth fade out transition before redirect
      document.body.style.opacity = '0';
      setTimeout(() => {
        window.location.href = "login.html";
      }, 400);
    }
  </script>
</body>
</html>
